<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <title>Personalized Video Greetings for Birthdays &amp; Special Occasions | prankwish.com</title>
  <meta name="description" content="Order personalized video greetings from your favorite celebrities and creators. Unique gifts for birthdays, holidays, and special occasions.">
  <link rel="canonical" href="https://prankwish.com/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://prankwish.com/">
  <meta property="og:title" content="Personalized Video Greetings | prankwish.com">
  <meta property="og:description" content="Order personalized video greetings from your favorite celebrities and creators. Unique gifts for birthdays, holidays, and special occasions.">
  <meta property="og:site_name" content="prankwish.com">
  <meta property="og:image" content="https://prankwish.com/favicon.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Personalized Video Greetings | prankwish.com">
  <meta name="twitter:description" content="Order personalized video greetings from your favorite celebrities and creators.">
  <meta name="twitter:image" content="https://prankwish.com/favicon.svg">

  <!-- Critical CSS inlined for faster FCP -->
  <style>
    :root{--primary:#4f46e5;--primary-hover:#4338ca;--success:#047857;--text-main:#1f2937;--text-muted:#4b5563;--bg-page:#f9fafb;--bg-card:#fff;--border:#e5e7eb;--radius:12px;--radius-sm:8px}
    body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;background-color:var(--bg-page);color:var(--text-main);line-height:1.5;-webkit-font-smoothing:antialiased}
    .site-header{background:#fff;border-bottom:1px solid var(--border);padding:1rem 0;margin-bottom:2rem}
    .header-inner{max-width:1200px;margin:0 auto;padding:0 1.5rem;display:flex;justify-content:space-between;align-items:center}
    .logo{font-weight:800;font-size:1.5rem;letter-spacing:-.5px}
    .site-nav a{margin-left:1.5rem;text-decoration:none;color:var(--text-main);font-weight:500;font-size:.95rem}
    main{max-width:1100px;margin:0 auto;padding:0 8% 4rem}
    h1{font-size:2rem;font-weight:800;margin:0 0 1.5rem;letter-spacing:-.02em}
    #product-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
    @media(max-width:600px){h1{font-size:1.5rem}#product-list{grid-template-columns:1fr}}
  </style>

  <!-- Non-critical CSS loaded asynchronously -->
  <link rel="preload" href="css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="css/style.css"></noscript>

  <!-- Structured Data for Product Collection -->
  <!-- Collection schema is injected server-side -->
</head>

<body>
  <!-- Load global components asynchronously -->
  <script defer src="js/global-components.js"></script>
  <div id="global-header-slot"></div>
  <main>
    <h1>Personalized Video Greetings</h1>
    <div id="product-list"></div>
  </main>
  <!-- Load the reusable product cards component before products.js so that
       ProductCards is available for rendering the homepage grid. -->
  <script defer src="js/product-cards.js"></script>
  <script defer src="js/products.js"></script>
  <!-- Load chat widget after parsing the document to avoid blocking render -->
  <script defer src="js/chat-widget.js"></script>
  <div id="global-footer-slot"></div>
</body>

</html>
