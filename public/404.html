<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <title>Page Not Found - prankwish.com</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-container {
      max-width: 600px;
      margin: 80px auto;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-message {
      font-size: 1.25rem;
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }
    .error-detail {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .error-link {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .error-link:hover {
      background: var(--primary-hover);
    }
  </style>
</head>

<body>
  <script defer src="/js/global-components.js"></script>
  <main>
    <div class="error-container">
      <div class="error-code">404</div>
      <p class="error-message">Page not found</p>
      <p class="error-detail">The page you're looking for doesn't exist or has been moved.</p>
      <a href="/" class="error-link">Back to Home</a>
    </div>
  </main>
</body>

</html>
