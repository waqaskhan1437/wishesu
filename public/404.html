<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <title>Page Not Found - prankwish.com</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-container {
      max-width: 600px;
      margin: 80px auto;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-message {
      font-size: 1.25rem;
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }
    .error-detail {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .error-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 1rem;
    }
    .error-link {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .error-link:hover {
      background: var(--primary-hover);
    }
    .error-link-outline {
      display: inline-block;
      background: transparent;
      color: var(--primary);
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 600;
      border: 2px solid var(--primary);
      transition: background 0.2s, color 0.2s;
    }
    .error-link-outline:hover {
      background: var(--primary);
      color: #fff;
    }
  </style>
</head>

<body>
  <script defer src="/js/global-components.js"></script>
  <div id="global-header-slot"></div>
  <main>
    <div class="error-container">
      <div class="error-code" aria-hidden="true">404</div>
      <h1 class="error-message">Page Not Found</h1>
      <p class="error-detail">The page you're looking for doesn't exist or has been moved.</p>
      <nav class="error-nav" aria-label="Helpful links">
        <a href="/" class="error-link">Back to Home</a>
        <a href="/products" class="error-link-outline">Browse Products</a>
        <a href="/blog" class="error-link-outline">Read Blog</a>
        <a href="/contact" class="error-link-outline">Contact Us</a>
      </nav>
    </div>
  </main>
  <div id="global-footer-slot"></div>
</body>

</html>
